<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>星穹铁道报告图</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 1080px;
      height: 1920px;
      margin: 0;
      overflow: hidden;
      background: #f7f1ff;
      color: #25283d;
      font-family: Inter, "Segoe UI", "Microsoft YaHei", system-ui, sans-serif;
    }

    body {
      position: relative;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 8% 8%, rgba(255, 112, 171, 0.26), transparent 28%),
        radial-gradient(circle at 95% 3%, rgba(71, 199, 253, 0.26), transparent 31%),
        linear-gradient(140deg, #fff2fa 0%, #eefaff 46%, #fff8df 100%);
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.55) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.55) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.75;
    }

    body::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(120deg, transparent 0 18%, rgba(255, 255, 255, 0.34) 18% 18.7%, transparent 18.7% 100%),
        linear-gradient(300deg, transparent 0 31%, rgba(255, 255, 255, 0.34) 31% 31.7%, transparent 31.7% 100%);
      pointer-events: none;
    }

    img {
      display: block;
      max-width: 100%;
    }

    .poster {
      position: relative;
      z-index: 1;
      width: 1080px;
      height: 1920px;
      padding: 36px 46px 72px;
      overflow: hidden;
    }

    .poster::before {
      content: "";
      position: absolute;
      right: -210px;
      top: 110px;
      width: 760px;
      height: 860px;
      background: var(--hero-bg) center top / contain no-repeat;
      opacity: 0.12;
      filter: saturate(1.1);
      pointer-events: none;
    }

    .header {
      position: relative;
      height: 418px;
      overflow: hidden;
      border: 2px solid rgba(255, 255, 255, 0.74);
      border-radius: 18px;
      background:
        linear-gradient(110deg, rgba(32, 34, 62, 0.88) 0%, rgba(41, 43, 78, 0.72) 48%, rgba(255, 255, 255, 0.28) 100%),
        var(--hero-bg) right -16px bottom -42px / auto 488px no-repeat;
      box-shadow: 0 30px 80px rgba(58, 46, 88, 0.24);
      color: white;
    }

    .header::before {
      content: "";
      position: absolute;
      inset: 16px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 14px;
      pointer-events: none;
    }

    .header-copy {
      position: relative;
      z-index: 2;
      width: 600px;
      padding: 38px 44px;
    }

    .kicker {
      display: inline-flex;
      align-items: center;
      min-height: 32px;
      padding: 0 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.2);
      color: rgba(255, 255, 255, 0.92);
      font-size: 17px;
      font-weight: 900;
    }

    h1 {
      margin: 18px 0 10px;
      font-size: 68px;
      line-height: 0.95;
      letter-spacing: 0;
      text-shadow: 0 12px 28px rgba(14, 16, 34, 0.32);
    }

    .signature {
      width: 520px;
      min-height: 62px;
      margin: 0;
      color: rgba(255, 255, 255, 0.88);
      font-size: 23px;
      line-height: 1.38;
    }

    .player-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 22px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 40px;
      padding: 0 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: white;
      font-size: 18px;
      font-weight: 900;
    }

    .avatar {
      position: absolute;
      right: 36px;
      top: 34px;
      width: 104px;
      height: 104px;
      overflow: hidden;
      border: 6px solid white;
      border-radius: 18px;
      background: linear-gradient(135deg, #ffffff, #fde7f5);
      box-shadow: 0 18px 36px rgba(17, 20, 42, 0.24);
      z-index: 3;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-top: 16px;
    }

    .stat {
      min-height: 102px;
      padding: 15px 18px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.72);
      background: rgba(255, 255, 255, 0.78);
      box-shadow: 0 18px 42px rgba(56, 49, 83, 0.12);
      backdrop-filter: blur(16px);
    }

    .stat-label {
      color: #747994;
      font-size: 16px;
      font-weight: 900;
    }

    .stat-value {
      margin-top: 6px;
      color: #292d47;
      font-size: 38px;
      line-height: 1;
      font-weight: 1000;
    }

    .stat-note {
      margin-top: 6px;
      color: #8c91aa;
      font-size: 14px;
      font-weight: 750;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .section-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 20px;
      margin: 26px 2px 14px;
    }

    .section-head h2 {
      margin: 0;
      color: #292d47;
      font-size: 34px;
      line-height: 1;
      letter-spacing: 0;
    }

    .section-head span {
      color: #777d98;
      font-size: 18px;
      font-weight: 850;
    }

    .characters {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .character {
      position: relative;
      height: 232px;
      overflow: hidden;
      display: grid;
      grid-template-columns: 126px minmax(0, 1fr);
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.78);
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.92), rgba(255, 255, 255, 0.68));
      box-shadow: 0 18px 46px rgba(56, 49, 83, 0.13);
    }

    .character::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(135deg, var(--element, rgba(255, 123, 189, 0.24)), transparent 44%),
        radial-gradient(circle at 92% 8%, rgba(255, 255, 255, 0.84), transparent 24%);
      opacity: 0.72;
    }

    .char-art {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      overflow: hidden;
      background:
        linear-gradient(to top, rgba(39, 42, 72, 0.48), transparent 58%),
        linear-gradient(155deg, rgba(255, 123, 189, 0.18), rgba(88, 215, 255, 0.11));
    }

    .char-art img {
      height: 252px;
      width: 190px;
      object-fit: cover;
      object-position: center 18%;
      filter: drop-shadow(0 14px 20px rgba(25, 28, 50, 0.22));
      transform: translateY(-16px);
    }

    .char-body {
      position: relative;
      z-index: 1;
      min-width: 0;
      padding: 14px 16px;
    }

    .char-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }

    .char-name {
      min-width: 0;
    }

    .char-name h3 {
      margin: 0;
      color: #292d47;
      font-size: 25px;
      line-height: 1.05;
      letter-spacing: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .char-name p {
      margin: 5px 0 0;
      color: #707690;
      font-size: 14px;
      font-weight: 900;
    }

    .stars {
      flex: 0 0 auto;
      padding: 6px 9px;
      border-radius: 999px;
      color: #4a3145;
      background: linear-gradient(135deg, #ffd36e, #ff7bbd);
      font-size: 14px;
      font-weight: 1000;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 10px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      height: 28px;
      max-width: 150px;
      padding: 0 9px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(95, 106, 150, 0.13);
      color: #535a78;
      font-size: 13px;
      font-weight: 900;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tag img {
      width: 18px;
      height: 18px;
      object-fit: contain;
    }

    .mini-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 7px;
      margin-top: 10px;
    }

    .mini {
      min-height: 48px;
      padding: 7px 8px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.64);
      border: 1px solid rgba(95, 106, 150, 0.12);
    }

    .mini span {
      display: block;
      color: #8a8fa8;
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .mini strong {
      display: block;
      margin-top: 4px;
      color: #30344c;
      font-size: 18px;
      line-height: 1;
      font-weight: 1000;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .cone {
      display: grid;
      grid-template-columns: 44px minmax(0, 1fr);
      gap: 9px;
      align-items: center;
      margin-top: 10px;
      padding: 7px;
      border-radius: 12px;
      background: rgba(37, 41, 70, 0.08);
      border: 1px solid rgba(95, 106, 150, 0.12);
    }

    .cone img {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      object-fit: cover;
      background: rgba(255, 255, 255, 0.72);
    }

    .cone strong,
    .cone span {
      display: block;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .cone strong {
      color: #343852;
      font-size: 15px;
      font-weight: 1000;
    }

    .cone span {
      margin-top: 4px;
      color: #777d99;
      font-size: 13px;
      font-weight: 850;
    }

    .footer {
      position: absolute;
      left: 46px;
      right: 46px;
      bottom: 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: #747994;
      font-size: 16px;
      font-weight: 850;
    }

    .footer strong {
      color: #ca477d;
    }
  </style>

g"}, {"id": "140704", "name": "掌心淌过的荒芜", "level": 10, "max_level": 15, "element": null, "type": "Talent", "type_text": "天赋", "effect": "Enhance", "effect_text": "强化", "simple_desc": "我方损失生命值时遐蝶获得【新蕊】，同时使遐蝶与死龙造成伤害提高，当【新蕊】达到上限可激活终结技。死龙在场时，除死龙以外我方损失生命值会转化为死龙同等的生命值。", "desc": "【新蕊】上限与场上全体角色等级有关，我方全体每损失1点生命值遐蝶获得1点【新蕊】，当【新蕊】达到上限时可激活终结技。我方损失生命值时，遐蝶与死龙造成的伤害提高20%，该效果最多叠加3层，持续3回合。\n死龙在场时无法通过天赋获得【新蕊】，除死龙以外我方全体每损失1点生命值会转化为死龙同等的生命值。", "icon": "icon/skill/1407_talent.png"}, {"id": "140706", "name": "140706", "level": 0, "max_level": 1, "element": {"id": "Quantum", "name": "量子", "color": "#1C29BA", "icon": "icon/element/Quantum.png"}, "type": "MazeNormal", "type_text": "", "effect": "MazeAttack", "effect_text": "", "simple_desc": "攻击敌人，进入战斗后削弱敌方目标对应属性韧性。", "desc": "", "icon": "icon/skill/1407_basic_atk.png"}, {"id": "140707", "name": "悲鸣，赐死之先声", "level": 1, "max_level": 1, "element": {"id": "Quantum", "name": "量子", "color": "#1C29BA", "icon": "icon/element/Quantum.png"}, "type": "Maze", "type_text": "秘技", "effect": "MazeAttack", "effect_text": "", "simple_desc": "进入【冥茫】状态，敌人无法主动靠近遐蝶，\n【冥茫】状态下攻击会使所有范围内的敌人进入战斗，同时召唤忆灵死龙使其行动提前100%。进入战斗时，消耗除死龙以外的我方全体生命值。\n进入战斗后未召唤死龙遐蝶回复等同于【新蕊】上限30%点数的【新蕊】。", "desc": "使用秘技后进入持续20秒的【冥茫】状态。【冥茫】状态下敌人无法主动靠近遐蝶。\n【冥茫】状态下主动攻击会使所有范围内的敌人进入战斗，同时召唤忆灵死龙使其行动提前100%并展开境界【遗世冥域】，死龙拥有等同于【新蕊】上限50%的当前生命值。进入战斗后，消耗除死龙以外的我方全体40%当前生命值。\n进入战斗后未召唤死龙则遐蝶获得等同于【新蕊】上限30%点数的【新蕊】。", "icon": "icon/skill/1407_technique.png"}, {"id": "140709", "name": "骸爪，冥龙之环拥", "level": 10, "max_level": 15, "element": {"id": "Quantum", "name": "量子", "color": "#1C29BA", "icon": "icon/element/Quantum.png"}, "type": "BPSkill", "type_text": "战技", "effect": "AoEAttack", "effect_text": "群攻", "simple_desc": "消耗我方全体生命值，遐蝶与死龙向目标发起连携攻击，对敌方全体造成量子属性伤害。", "desc": "消耗除死龙以外的我方全体当前40%的生命值，遐蝶与死龙向目标发起连携攻击，对敌方全体造成等同于遐蝶30.0%和50.0%生命上限的量子属性伤害。\n若当前生命值不足，最多使当前生命值降至1点。", "icon": "icon/skill/1407_skill.png"}], "skill_trees": [{"id": "1407001", "level": 6, "anchor": "Point01", "max_level": 6, "icon": "icon/skill/1407_basic_atk. %", "percent": true}, {"type": "BreakDamageAddedRatioBase", "field": "break_dmg", "name": "击破特攻", "icon": "icon/property/IconBreakUp.png", "value": 0.1944000024, "display": "19.4%", "percent": true}, {"type": "DefenceDelta", "field": "def", "name": "防御力", "icon": "icon/property/IconDefence.png", "value": 74.090707, "display": "74", "percent": false}, {"type": "PhysicalAddedRatio", "field": "physical_dmg", "name": "物理属性伤害提高", "icon": "icon/property/IconPhysicalAddedRatio.png", "value": 0.388803015, "display": "38.8%", "percent": true}, {"type": "SpeedDelta", "field": "spd", "name": "速度", "icon": "icon/property/IconSpeed.png", "value": 4.3, "display": "4", "percent": false}], "pos": [4]}, {"id": "1408", "name": "白厄", "rarity": 5, "rank": 0, "level": 80, "promotion": 6, "enhanced": false, "icon": "icon/character/1408.png", "preview": "image/character_preview/1408.png", "portrait": "image/character_portrait/1408.png", "rank_icons": ["icon/skill/1408_rank1.png", "icon/skill/1408_rank2.png", "icon/skill/1408_ultimate.png", "icon/skill/1408_rank4.png", "icon/skill/1408_skill.png", "icon/skill/1408_rank6.png"], "path": {"id": "Warrior", "name": "毁灭", "icon": "icon/path/Destruction.png"}, "element": {"id": "Physical", "name": "物理", "color": "#FFFFFF", "icon": "icon/element/Physical.png"}, "skills": [{"id": "140801", "name": "逐火救世，行则将至", "level": 6, "max_level": 10, "element": {"id": "Physical", "name": "物理", "color": "#FFFFFF", "icon": "icon/element/Physical.png"}, "type": "Normal", "type_text": "普攻", "effect": "SingleAttack", "effect_text": "单攻", "simple_desc": "对敌方单体造成少量物理属性伤害。", "desc": "对指定敌方单体造成等同于白厄100%攻击力的物理属性伤害。", "icon": "icon/skill/1408_basic_atk.png"}, {"id": "140802", "name": "黎明创世，地辟天开", "level": 10, "max_level": 15, "element": {"id": "Physical", "name": "物理", "color": "#FFFFFF", "icon": "icon/element/Physical.png"}, "type": "BPSkill", "type_text": "战技", "effect": "Blast", "effect_text": "扩散", "simple_desc": "获得2点【火种】，对敌方单体造成大量物理属性伤害，对相邻目标造成物理属性伤害。", "desc": "获得2点【火种】，对指定敌方单体造成等同于白厄300%攻击力的物理属性伤害，对相邻目标造成等同于白厄120%攻击力的物理属性伤害。", "icon": "icon/skill/1408_skill.png"}, {"id": "140803", "name": "永劫燔世，其将背负", "level": 10, "max_level": 15, "element": {"id": "Physical", "name": "物理", "color": "#FFFFFF", "icon": "icon/element/Physical.png"}, "type": "Ultra", "type_text": "终结技", "effect": "AoEAttack", "effect_text": "群攻", "simple_desc": "变身为卡厄斯兰那并展开境界：使队友离场且无法行动，敌方全体拥有物理属性弱点。\n卡厄斯兰那不会进入自己的回合但拥有8个卡厄斯兰那的额外回合，最后的回合内发动最后一击，造成由敌方全体均分的大量物理属性伤害。", "desc": "变身为卡厄斯兰那，变身期间展开境界【时墟铁墓】。境界内的其他队友离场且无法行动，敌方全体始终拥有物理属性弱点。\n卡厄斯兰那不会进入自己的回合，但拥有8个卡厄斯兰那的额外回合，速度固定为卡厄斯兰那基础速度的60%。最后的卡厄斯兰那的额外回合开始时立即发动最后一击，造成等同于卡厄斯兰那960%攻击力的物理属性终结技伤害，由敌方全体均分。", "icon": "icon/skill/1408_ultimate.png"}, {"id": "140804", "name": "此身为炬", "level": 10, "max_level": 15, "element": null, "type": "Talent", "type_text": "天赋", "effect": "Enhance", "effect_text": "强化", "simple_desc": "白厄的天赋。【火种】达到12点时可激活终结技。\n当白厄成为其他目标的技能目标时，获得【火种】。成为队友的技能目标时，暴击伤害提高。", "desc": "白厄的天赋。【火种】达到12点时可激活终结技，达到上限后还可最多溢出3点，变身结束时会基于溢出点数获得【火种】。\n当白厄成为其他任意目标的技能目标时，获得1点【火种】。若施放者为白厄的队友，还会使白厄的暴击伤害提高30%，持续3回合。", "icon": "icon/skill/1408_talent.png"}, {"id": "140805", "name": "命运•此躯即神", "level": 10, "max_level": 15, "element": null, "type": "Talent", "type_text": "天赋", "effect": "Enhance", "effect_text": "强化", "simple_desc": "卡厄斯兰那的天赋。变身时获得【毁伤】。\n卡厄斯兰那免疫控制类负面状态并拥有3个新技能。变身期间攻击力和生命上限提高，施放攻击回复生命值，受到致命攻击时回复生命值并立即施放最后一击，剩余可行动次数越多伤害倍率越低。\n结束变身时，使我方全体速度提高。", "desc": "卡厄斯兰那的天赋。变身时获得4点【毁伤】。若此时处于我方目标的回合，则使该目标的所有增益效果延长1回合并结束本回合。\n卡厄斯兰那免疫控制类负面状态，拥有1个强化普攻和2个强化战技，无法施放终结技。变身期间攻击力提高80%，生命上限提高270%，施放攻击后回复等同于自身生命上限20%的生命值。卡厄斯兰那受到致命攻击时不会陷入无法战斗状态，而是回复等同于自身生命上限25%的生命值并立即发动最后一击。每剩余1个卡厄斯兰那的额外回合，最后一击的伤害倍率减少原倍率的12.5%。\n变身结束时，使我方全体速度提高15%，持续1回合。", "icon": "icon/skill/1408_talent.png"}, {"id": "140806", "name": "140806", "level": 0, "max_level": 1, "element": {"id": "Physical", "name": "物理", "color": "#FFFFFF", "icon": "icon/element/Physical.png"}, "type": "MazeNormal", "type_text": "", "effect": "MazeAttack", "effect_text": "", "simple_desc": "攻击敌人，进入战斗后削弱敌方目标对应属性韧性。", "desc": "", "icon": "icon/skill/1408_basic_atk.png"}, {"id": "140807", "name": "终结之始", "level": 1, "max_level": 1, "element": {"id": "Physical", "name": "物理", "color": "#FFFFFF", "icon": "icon/element/Physical.png"}, "type": "Maze", "type_text": "秘技", "effect": "MazeAttack", "effect_text": "", "simple_desc": "秘技点上限提高3点。主动施放消耗2点秘技点攻击一定范围内的所有敌人。进入战斗后为我方恢复能量、战技点和【毁伤】，每个波次开始时对敌方全体造成物理属性伤害。\n若攻击普通敌人则立即将其消灭，不会进入战斗。未击中敌人时不消耗秘技点。", "desc": "白厄在队伍中时，使秘技点上限提高3点。\n主动施放秘技消耗2点秘技点，立即攻击一定范围内的所有敌人。进入战斗后，为我方队友恢复25点能量，获得2点【毁伤】和1个战技点，并且每个波次开始时对敌方全体造成等同于白厄200%攻击力的物理属性伤害。\n若攻击普通敌人则立即将其消灭，不会进入战斗。未击中敌人时不消耗秘技点。", "icon": "icon/skill/1408_technique.png"}, {"id": "140808", "name": "创生•血棘渡亡", "level": 6, "max_level": 10, "element": {"id": "Physical", "name": "物理", "color": "#FFFFFF", "icon": "icon/element/Physical.png"}, "type": "Normal", "type_text": "普攻", "effect": "Blast", "effect_text": "扩散", "simple_desc": "获得2点【毁伤】，对指定敌方单体造成大量物理属性伤害，对相邻目标造成物理属性伤害。", "desc": "获得2点【毁伤】，对指定敌方单体造成等同于卡厄斯兰那250%攻击力的物理属性伤害，对相邻目标造成等同于卡厄斯兰那75%攻击力的物理属性伤害。", "icon": "icon/skill/1408_basic_atk.png"}, {"id": "140809", "name": "灾厄•弑魂焚诏", "level": 10, "max_level": 15, "element": null, "type": "BPSkill", "type_text": "战技", "effect": "Enhance", "effect_text": "强化", "simple_desc": "基于敌人数量获得等量【毁伤】，使其立即行动。获得【弑魂之炽】：受到的伤害降低，敌方目标都行动过后发动反击，对敌方全体造成少量物理属性伤害并弹射4次，每次对敌方随机单体造成少量物理属性伤害。敌方行动次数越多伤害越高。", "desc": "获得等同于敌方全体数量的【毁伤】和1层【弑魂之炽】，随后使敌方全体立即行动。\n【弑魂之炽】状态下，卡厄斯兰那受到的伤害降低75%，敌方目标攻击或行动后叠加1层【弑魂之炽】。上述敌方目标行动完毕后，立即发动反击，对敌方全体造成等同于卡厄斯兰那40%攻击力的物理属性伤害，并额外造成4次伤害，每次对敌方随机单体造成等同于卡厄斯兰那30%攻击力的物理属性伤害，随后解除【弑魂之炽】。每层【弑魂之炽】使本次反击的伤害倍率提高原倍率的20%。\n通过此技能造成伤害时，被视为造成了战技伤害。若卡厄斯兰那的额外回合开始时仍持有【弑魂之炽】，立即发动反击。", "icon": "icon/skill/1408_skill.png"}, {"id": "140811", "name": "支柱•死星天裁", "level": 10, "max_level": 15, "element": {"id": "Physical", "name": "物理", "color": "#FFFFFF", "icon": "icon/element/Physical.png"}, "type": "BPSkill", "type_text": "战技", "effect": "Bounce", "effect_text": "弹射", "simple_desc": "解除自身所有负面效果。每消耗1点【毁伤】弹射4次，每次对敌方随机单体造成少量物理属性伤害。\n若消耗了4点【毁伤】，额外造成由敌方全体均分的大量物理属性伤害。", "desc": "解除自身所有负面效果，随后造成最多等同于卡厄斯兰那1170%攻击力的物理属性伤害。\n其中，每消耗1点【毁伤】造成4次伤害，每次对敌方随机单体造成等同于卡厄斯兰那45.0%攻击力的物理属性伤害。消耗4点【毁伤】时，额外造成等同于卡厄斯兰那450%攻击力的物理属性伤害，由敌方全体均分。", "icon": "icon/skill/1408_skill.png"}], "skill_trees": [{"id": "1408001", "level": 6, "anchor": "Point01", "max_level": 6, "icon": "icon/skill/1408_basic_atk.png", "parent": null}, {"id": "1408002", "level": 10, "anchor": "Point02", "max_level": 10, "icon": "icon/skill/1408_skill.png", "parent": null}, {"id": "1408003", "level": 10, "anchor": "Point03", "max_level": 10, "icon": "icon/skill/1408_ultimate.png", "parent": null}, {"id": "1408004", "level": 10, "anchor": "Point04", "max_level": 10, "icon": "icon/skill/1408_talent.png", "parent": null}, {"id": "1408007", "level": 1, "anchor": "Point05", "max_level": 1, "icon": "icon/skill/1408_technique.png", "parent": null}, {"id": "1408101", "level": 1, "anchor": "Point06", "max_level": 1, "icon": "icon/skill/1408_skilltree1.png", "parent": null}, {"id": "1408102", "level": 1, "anchor": "Point07", "max_level": 1, "icon": "icon/skill/1408_skilltree2.png", "parent": null}, {"id": "1408103", "level": 1, "anchor": "Point08", "max_level": 1, "icon": "icon/skill/1408_skilltree3.png", "parent": null}, {"id": "1408201", "level": 1, "anchor": "Point09", "max_level": 1, "icon": "icon/property/IconCriticalDamage.png", "parent": null}, {"id": "1408202", "level": 1, "anchor": "Point10", "max_level": 1, "icon": "icon/property/IconCriticalChance.png", "parent": "1408101"}, {"id": "1408203", "level": 1, "anchor": "Point11", "max_level": 1, "icon": "icon/property/IconCriticalDamage.png", "parent": "1408202"}, {"id": "1408204", "level": 1, "anchor": "Point12", "max_level": 1, "icon": "icon/property/IconSpeed.png", "parent": "1408203"}, {"id": "1408205", "level": 1, "anchor": "Point13", "max_level": 1, "icon": "icon/property/IconCriticalDamage.png", "parent": "1408102"}, {"id": "1408206", "level": 1, "anchor": "Point14", "max_level": 1, "icon": "     const escapeHtml = (value) => String(value ?? "")

      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");

    function asset(path) {
      if (!path) return "";
      if (/^https?:\/\//i.test(path)) return path;
      return ASSET_BASE + String(path).replace(/^\/+/, "");
    }

    function alpha(hex, a) {
      const fallback = `rgba(255, 123, 189, ${a})`;
      if (!hex || !/^#[0-9a-f]{6}$/i.test(hex)) return fallback;
      const value = parseInt(hex.slice(1), 16);
      return `rgba(${(value >> 16) & 255}, ${(value >> 8) & 255}, ${value & 255}, ${a})`;
    }

    function fieldValue(character, fields) {
      const list = [
        ...(character.attributes || []),
        ...(character.additions || []),
        ...(character.statistics || [])
      ];
      for (const field of fields) {
        const found = list.find((item) => item.field === field || item.name === field);
        if (found) return found.display ?? found.value ?? "-";
      }
      return "-";
    }

    function stat(label, value, note) {
      return `
        <article class="stat">
          <div class="stat-label">${escapeHtml(label)}</div>
          <div class="stat-value">${escapeHtml(value ?? "-")}</div>
          <div class="stat-note">${escapeHtml(note ?? "")}</div>

      `;

            <div class="mini-stats">

            </div>

              ${cone ? `<img src="${asset(cone.icon)}" alt="">` : "<span></span>"}

            </div>
          </div>
        </article>
      `;

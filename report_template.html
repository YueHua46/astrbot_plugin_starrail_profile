<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>星穹铁道报告图</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 1080px;
      height: 1920px;
      margin: 0;
      overflow: hidden;
      background: #f7f1ff;
      color: #25283d;
      font-family: Inter, "Segoe UI", "Microsoft YaHei", system-ui, sans-serif;
    }

    body {
      position: relative;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 8% 8%, rgba(255, 112, 171, 0.26), transparent 28%),
        radial-gradient(circle at 95% 3%, rgba(71, 199, 253, 0.26), transparent 31%),
        linear-gradient(140deg, #fff2fa 0%, #eefaff 46%, #fff8df 100%);
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.55) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.55) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.75;
    }

    body::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(120deg, transparent 0 18%, rgba(255, 255, 255, 0.34) 18% 18.7%, transparent 18.7% 100%),
        linear-gradient(300deg, transparent 0 31%, rgba(255, 255, 255, 0.34) 31% 31.7%, transparent 31.7% 100%);
      pointer-events: none;
    }

    img {
      display: block;
      max-width: 100%;
    }

    .poster {
      position: relative;
      z-index: 1;
      width: 1080px;
      height: 1920px;
      padding: 36px 46px 72px;
      overflow: hidden;
    }

    .poster::before {
      content: "";
      position: absolute;
      right: -210px;
      top: 110px;
      width: 760px;
      height: 860px;
      background: var(--hero-bg) center top / contain no-repeat;
      opacity: 0.12;
      filter: saturate(1.1);
      pointer-events: none;
    }

    .header {
      position: relative;
      height: 418px;
      overflow: hidden;
      border: 2px solid rgba(255, 255, 255, 0.74);
      border-radius: 18px;
      background:
        linear-gradient(110deg, rgba(32, 34, 62, 0.88) 0%, rgba(41, 43, 78, 0.72) 48%, rgba(255, 255, 255, 0.28) 100%),
        var(--hero-bg) right -16px bottom -42px / auto 488px no-repeat;
      box-shadow: 0 30px 80px rgba(58, 46, 88, 0.24);
      color: white;
    }

    .header::before {
      content: "";
      position: absolute;
      inset: 16px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 14px;
      pointer-events: none;
    }

    .header-copy {
      position: relative;
      z-index: 2;
      width: 600px;
      padding: 38px 44px;
    }

    .kicker {
      display: inline-flex;
      align-items: center;
      min-height: 32px;
      padding: 0 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.2);
      color: rgba(255, 255, 255, 0.92);
      font-size: 17px;
      font-weight: 900;
    }

    h1 {
      margin: 18px 0 10px;
      font-size: 68px;
      line-height: 0.95;
      letter-spacing: 0;
      text-shadow: 0 12px 28px rgba(14, 16, 34, 0.32);
    }

    .signature {
      width: 520px;
      min-height: 62px;
      margin: 0;
      color: rgba(255, 255, 255, 0.88);
      font-size: 23px;
      line-height: 1.38;
    }

    .player-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 22px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 40px;
      padding: 0 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: white;
      font-size: 18px;
      font-weight: 900;
    }

    .avatar {
      position: absolute;
      right: 36px;
      top: 34px;
      width: 104px;
      height: 104px;
      overflow: hidden;
      border: 6px solid white;
      border-radius: 18px;
      background: linear-gradient(135deg, #ffffff, #fde7f5);
      box-shadow: 0 18px 36px rgba(17, 20, 42, 0.24);
      z-index: 3;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-top: 16px;
    }

    .stat {
      min-height: 102px;
      padding: 15px 18px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.72);
      background: rgba(255, 255, 255, 0.78);
      box-shadow: 0 18px 42px rgba(56, 49, 83, 0.12);
      backdrop-filter: blur(16px);
    }

    .stat-label {
      color: #747994;
      font-size: 16px;
      font-weight: 900;
    }

    .stat-value {
      margin-top: 6px;
      color: #292d47;
      font-size: 38px;
      line-height: 1;
      font-weight: 1000;
    }

    .stat-note {
      margin-top: 6px;
      color: #8c91aa;
      font-size: 14px;
      font-weight: 750;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .section-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 20px;
      margin: 26px 2px 14px;
    }

    .section-head h2 {
      margin: 0;
      color: #292d47;
      font-size: 34px;
      line-height: 1;
      letter-spacing: 0;
    }

    .section-head span {
      color: #777d98;
      font-size: 18px;
      font-weight: 850;
    }

    .characters {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .character {
      position: relative;
      height: 232px;
      overflow: hidden;
      display: grid;
      grid-template-columns: 126px minmax(0, 1fr);
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.78);
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.92), rgba(255, 255, 255, 0.68));
      box-shadow: 0 18px 46px rgba(56, 49, 83, 0.13);
    }

    .character::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(135deg, var(--element, rgba(255, 123, 189, 0.24)), transparent 44%),
        radial-gradient(circle at 92% 8%, rgba(255, 255, 255, 0.84), transparent 24%);
      opacity: 0.72;
    }

    .char-art {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      overflow: hidden;
      background:
        linear-gradient(to top, rgba(39, 42, 72, 0.48), transparent 58%),
        linear-gradient(155deg, rgba(255, 123, 189, 0.18), rgba(88, 215, 255, 0.11));
    }

    .char-art img {
      height: 252px;
      width: 190px;
      object-fit: cover;
      object-position: center 18%;
      filter: drop-shadow(0 14px 20px rgba(25, 28, 50, 0.22));
      transform: translateY(-16px);
    }

    .char-body {
      position: relative;
      z-index: 1;
      min-width: 0;
      padding: 14px 16px;
    }

    .char-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }

    .char-name {
      min-width: 0;
    }

    .char-name h3 {
      margin: 0;
      color: #292d47;
      font-size: 25px;
      line-height: 1.05;
      letter-spacing: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .char-name p {
      margin: 5px 0 0;
      color: #707690;
      font-size: 14px;
      font-weight: 900;
    }

    .stars {
      flex: 0 0 auto;
      padding: 6px 9px;
      border-radius: 999px;
      color: #4a3145;
      background: linear-gradient(135deg, #ffd36e, #ff7bbd);
      font-size: 14px;
      font-weight: 1000;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 10px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      height: 28px;
      max-width: 150px;
      padding: 0 9px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(95, 106, 150, 0.13);
      color: #535a78;
      font-size: 13px;
      font-weight: 900;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tag img {
      width: 18px;
      height: 18px;
      object-fit: contain;
    }

    .mini-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 7px;
      margin-top: 10px;
    }

    .mini {
      min-height: 48px;
      padding: 7px 8px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.64);
      border: 1px solid rgba(95, 106, 150, 0.12);
    }

    .mini span {
      display: block;
      color: #8a8fa8;
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .mini strong {
      display: block;
      margin-top: 4px;
      color: #30344c;
      font-size: 18px;
      line-height: 1;
      font-weight: 1000;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .cone {
      display: grid;
      grid-template-columns: 44px minmax(0, 1fr);
      gap: 9px;
      align-items: center;
      margin-top: 10px;
      padding: 7px;
      border-radius: 12px;
      background: rgba(37, 41, 70, 0.08);
      border: 1px solid rgba(95, 106, 150, 0.12);
    }

    .cone img {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      object-fit: cover;
      background: rgba(255, 255, 255, 0.72);
    }

    .cone strong,
    .cone span {
      display: block;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .cone strong {
      color: #343852;
      font-size: 15px;
      font-weight: 1000;
    }

    .cone span {
      margin-top: 4px;
      color: #777d99;
      font-size: 13px;
      font-weight: 850;
    }

    .footer {
      position: absolute;
      left: 46px;
      right: 46px;
      bottom: 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: #747994;
      font-size: 16px;
      font-weight: 850;
    }

    .footer strong {
      color: #ca477d;
    }
  </style>
</head>
<body>
  <main class="poster" id="poster"></main>
  <script>
    const REPORT_DATA = __REPORT_DATA__;
    const GENERATED_AT = "__GENERATED_AT__";
    const ASSET_BASE = "https://raw.githubusercontent.com/Mar-7th/StarRailRes/master/";

    const escapeHtml = (value) => String(value ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");

    function asset(path) {
      if (!path) return "";
      if (/^https?:\/\//i.test(path)) return path;
      return ASSET_BASE + String(path).replace(/^\/+/, "");
    }

    function alpha(hex, a) {
      const fallback = `rgba(255, 123, 189, ${a})`;
      if (!hex || !/^#[0-9a-f]{6}$/i.test(hex)) return fallback;
      const value = parseInt(hex.slice(1), 16);
      return `rgba(${(value >> 16) & 255}, ${(value >> 8) & 255}, ${value & 255}, ${a})`;
    }

    function fieldValue(character, fields) {
      const list = [
        ...(character.attributes || []),
        ...(character.additions || []),
        ...(character.statistics || [])
      ];
      for (const field of fields) {
        const found = list.find((item) => item.field === field || item.name === field);
        if (found) return found.display ?? found.value ?? "-";
      }
      return "-";
    }

    function stat(label, value, note) {
      return `
        <article class="stat">
          <div class="stat-label">${escapeHtml(label)}</div>
          <div class="stat-value">${escapeHtml(value ?? "-")}</div>
          <div class="stat-note">${escapeHtml(note ?? "")}</div>
        </article>
      `;
    }

    function tag(label, icon) {
      if (!label) return "";
      return `<span class="tag">${icon ? `<img src="${asset(icon)}" alt="">` : ""}${escapeHtml(label)}</span>`;
    }

    function characterCard(character) {
      const stats = [
        ["生命", fieldValue(character, ["hp", "生命值", "HP"])],
        ["攻击", fieldValue(character, ["atk", "攻击力", "ATK"])],
        ["速度", fieldValue(character, ["spd", "速度", "SPD"])],
        ["暴击", fieldValue(character, ["crit_rate", "暴击率", "CRIT Rate"])],
        ["暴伤", fieldValue(character, ["crit_dmg", "暴击伤害", "CRIT DMG"])],
        ["击破", fieldValue(character, ["break_dmg", "击破特攻", "Break Effect"])]
      ];
      const cone = character.light_cone;
      return `
        <article class="character" style="--element:${alpha(character.element?.color, 0.3)}">
          <div class="char-art">
            <img src="${asset(character.preview || character.portrait || character.icon)}" data-fallback="${asset(character.icon || character.portrait || character.preview)}" onerror="this.onerror=null;this.src=this.dataset.fallback" alt="${escapeHtml(character.name)}">
          </div>
          <div class="char-body">
            <div class="char-top">
              <div class="char-name">
                <h3>${escapeHtml(character.name || "未知角色")}</h3>
                <p>Lv.${escapeHtml(character.level ?? "-")} / 星魂 ${escapeHtml(character.rank ?? 0)} / 晋阶 ${escapeHtml(character.promotion ?? "-")}</p>
              </div>
              <div class="stars">${"★".repeat(character.rarity || 0)}</div>
            </div>
            <div class="tags">
              ${tag(character.element?.name, character.element?.icon)}
              ${tag(character.path?.name, character.path?.icon)}
              ${tag(`展位 ${(character.pos || []).join(", ") || "-"}`)}
            </div>
            <div class="mini-stats">
              ${stats.map(([label, value]) => `<div class="mini"><span>${escapeHtml(label)}</span><strong>${escapeHtml(value)}</strong></div>`).join("")}
            </div>
            <div class="cone">
              ${cone ? `<img src="${asset(cone.icon)}" alt="">` : "<span></span>"}
              <div>
                <strong>${escapeHtml(cone?.name || "未装备光锥")}</strong>
                <span>${cone ? `${"★".repeat(cone.rarity || 0)} / Lv.${cone.level ?? "-"} / 叠影 ${cone.rank ?? "-"}` : "暂无公开数据"}</span>
              </div>
            </div>
          </div>
        </article>
      `;
    }

    function render() {
      const data = REPORT_DATA || {};
      const player = data.player || {};
      const characters = Array.isArray(data.characters) ? data.characters : [];
      const featured = [...characters]
        .sort((a, b) => (a.pos?.[0] ?? 99) - (b.pos?.[0] ?? 99))
        .slice(0, 8);
      const topCharacter = featured[0] || characters[0] || {};
      const info = player.space_info || {};
      const memory = info.memory_data || {};
      const heroUrl = asset(topCharacter.portrait || topCharacter.preview || player.avatar?.icon || "image/character_portrait/1001.png");
      const poster = document.querySelector("#poster");

      poster.style.setProperty("--hero-bg", `url("${heroUrl}")`);
      poster.innerHTML = `
        <section class="header">
          <div class="avatar"><img src="${asset(player.avatar?.icon || topCharacter.icon)}" alt=""></div>
          <div class="header-copy">
            <span class="kicker">Star Rail Showcase Report</span>
            <h1>${escapeHtml(player.nickname || `UID ${player.uid || "-"}`)}</h1>
            <p class="signature">${escapeHtml(player.signature || "这位开拓者还没有留下签名。")}</p>
            <div class="player-row">
              <span class="pill">UID ${escapeHtml(player.uid || "-")}</span>
              <span class="pill">开拓等级 ${escapeHtml(player.level ?? "-")}</span>
              <span class="pill">均衡 ${escapeHtml(player.world_level ?? "-")}</span>
              <span class="pill">${escapeHtml(characters.length)} 位展示角色</span>
            </div>
          </div>
        </section>

        <section class="summary">
          ${stat("开拓等级", player.level, `UID ${player.uid || "-"}`)}
          ${stat("均衡等级", player.world_level, `${player.friend_count ?? 0} 位好友`)}
          ${stat("角色收集", info.avatar_count ?? characters.length, `${characters.length} 位展示`)}
          ${stat("混沌星数", memory.chaos_star_count ?? "-", `层数 ${memory.chaos_level ?? memory.level ?? "-"}`)}
          ${stat("模拟宇宙", info.universe_level ?? "-", "最高挑战记录")}
          ${stat("光锥", info.light_cone_count ?? "-", "公开统计")}
          ${stat("遗器", info.relic_count ?? "-", "公开统计")}
          ${stat("成就", info.achievement_count ?? "-", `书籍 ${info.book_count ?? "-"} / 音乐 ${info.music_count ?? "-"}`)}
        </section>

        <div class="section-head">
          <h2>展示角色阵容</h2>
          <span>TOP ${featured.length} / ${characters.length}</span>
        </div>
        <section class="characters">
          ${featured.map(characterCard).join("")}
        </section>

        <footer class="footer">
          <span>Generated by <strong>hk-star-rail-api</strong></span>
          <span>${escapeHtml(GENERATED_AT)}</span>
        </footer>
      `;
    }

    render();
  </script>
</body>
</html>
